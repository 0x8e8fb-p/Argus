name: Android CI/CD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build Debug APKs
      run: |
        # If gradlew doesn't exist, use the system gradle to generate the wrapper
        if [ ! -f "./gradlew" ]; then
          gradle wrapper --gradle-version 8.11.1
        fi
        ./gradlew assembleDebug

    - name: Prepare Release Artifacts
      run: |
        mkdir -p release_apks
        # Copy all generated APKs to a single directory
        find app/build/outputs/apk/debug -name "*.apk" -exec cp {} release_apks/ \;

    - name: Generate Short SHA
      id: vars
      run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v1.0-${{ steps.vars.outputs.sha_short }}"
        name: "NexusBlock Release (${{ steps.vars.outputs.sha_short }})"
        draft: false
        prerelease: false
        files: release_apks/*.apk
        body: |
          Automated build generated from commit ${{ github.sha }}.
          Contains APKs for all architectures (Universal, ARM, ARM64, x86, x86_64).
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
