name: Android CI

on:
  workflow_dispatch:
    inputs:
      release_name:
        description: "Release version (e.g., v1.2.3)"
        required: true
        default: "v1.0.0"
      version_code:
        description: "Version code for the build"
        required: true
        default: "1"
      version_name:
        description: "Version name for the build"
        required: true
        default: "1.0.0"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build APK and AAB
        run: ./gradlew assembleRelease bundleRelease
        env:
          VERSION_CODE: ${{ github.event.inputs.version_code }}
          VERSION_NAME: ${{ github.event.inputs.version_name }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-release
          path: app/build/outputs/apk/release/*.apk

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aab-release
          path: app/build/outputs/bundle/release/*.aab

  sign-apk:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download APK Artifact
        uses: actions/download-artifact@v4
        with:
          name: apk-release
          path: apk/

      - name: Sign APK
        uses: ilharp/sign-android-release@v1
        with:
          releaseDir: apk/
          signingKey: ${{ secrets.SIGNING_KEY }}
          keyAlias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: signed-apk
          path: apk/*-signed.apk

  sign-aab:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download AAB Artifact
        uses: actions/download-artifact@v4
        with:
          name: aab-release
          path: aab/

      - name: Sign AAB
        uses: ilharp/sign-android-release@v1
        with:
          releaseDir: aab/
          signingKey: ${{ secrets.SIGNING_KEY }}
          keyAlias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: signed-aab
          path: aab/*-signed.aab

  create-release:
    needs: [sign-apk, sign-aab]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Signed APK
        uses: actions/download-artifact@v4
        with:
          name: signed-apk
          path: release/

      - name: Download Signed AAB
        uses: actions/download-artifact@v4
        with:
          name: signed-aab
          path: release/

      - name: Create GitHub Release
        uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          automatic_release_tag: ${{ github.event.inputs.release_name }}
          prerelease: false
          title: "NexusBlock Android TV Release ${{ github.event.inputs.release_name }}"
          files: |
            release/*.apk
            release/*.aab
