name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Grant execute permission for Gradlew
        run: chmod +x ./gradlew

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build with Gradle
        run: ./gradlew assembleRelease bundleRelease -x lint -x test --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Check available secrets
        id: check
        run: |
          if [ -n "${{ secrets.SIGNING_KEY }}" ]; then
            echo "has_signing=true" >> $GITHUB_OUTPUT
          else
            echo "has_signing=false" >> $GITHUB_OUTPUT
          fi

      - name: Download APK Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release-apk
          path: artifacts/apk/

      - name: Download AAB Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release-aab
          path: artifacts/aab/

      - name: Sign APK
        if: steps.check.outputs.has_signing == 'true'
        id: sign_apk
        uses: ilharp/sign-android-release@v1
        with:
          releaseDir: artifacts/apk/
          signingKey: ${{ secrets.SIGNING_KEY }}
          keyAlias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Sign AAB
        if: steps.check.outputs.has_signing == 'true'
        id: sign_aab
        uses: ilharp/sign-android-release@v1
        with:
          releaseDir: artifacts/aab/
          signingKey: ${{ secrets.SIGNING_KEY }}
          keyAlias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Generate Short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | grep -oP '"\K[^"]+')
          echo "name=${VERSION:-1.0.0}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.name }}-${{ steps.vars.outputs.sha_short }}"
          name: "NexusBlock v${{ steps.version.outputs.name }} (${{ steps.vars.outputs.sha_short }})"
          draft: false
          prerelease: false
          files: |
            artifacts/apk/*.apk
            artifacts/aab/*.aab
          body: |
            ## NexusBlock Ad Blocker for Android TV

            **Automated release** from commit `${{ github.sha }}`.

            ### What's included
            - System-wide DNS-based ad blocking with SNI inspection
            - YouTube, Prime Video, Hotstar, SonyLiv, Zee5, and 20+ Indian OTT ad blocking
            - 800+ built-in emergency ad domains
            - 14 remote blocklist sources (1M+ domains)
            - Per-app firewall control
            - DoH/DoT encrypted DNS bypass prevention
            - Auto-start on boot with watchdog service

            ### Install
            Download the APK and sideload on your Android TV via ADB:
            ```bash
            adb install app-release-unsigned.apk
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Check Play Store secret
        id: check
        run: |
          if [ -n "${{ secrets.PLAY_STORE_JSON_KEY }}" ]; then
            echo "has_playstore=true" >> $GITHUB_OUTPUT
          else
            echo "has_playstore=false" >> $GITHUB_OUTPUT
          fi

      - name: Download AAB Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release-aab
          path: app/build/outputs/bundle/release/

      - name: Set up Ruby
        if: steps.check.outputs.has_playstore == 'true'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Write Play Store Service Account Key
        if: steps.check.outputs.has_playstore == 'true'
        run: echo "${{ secrets.PLAY_STORE_JSON_KEY }}" > play-store-key.json

      - name: Deploy to Play Store (internal)
        if: steps.check.outputs.has_playstore == 'true'
        env:
          SUPPLY_JSON_KEY: play-store-key.json
        run: bundle exec fastlane android deploy_internal
