name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Grant execute permission for Gradlew
        run: chmod +x ./gradlew

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build
        run: ./gradlew build

      - name: Assemble Release APK
        run: ./gradlew assembleRelease

      - name: Assemble Release AAB
        run: ./gradlew bundleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: app/build/outputs/bundle/release/*.aab

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    env:
      AAB_PATH: app/build/outputs/bundle/release/app-release.aab
      APK_PATH: app/build/outputs/apk/release/app-release.apk

    steps:
      - uses: actions/checkout@v4

      - name: Download AAB Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release-aab
          path: app/build/outputs/bundle/release/

      - name: Check artifacts exist
        run: |
          if [ ! -f "$AAB_PATH" ]; then
            echo "AAB not found at $AAB_PATH"
            exit 1
          fi
          echo "AAB ready: $AAB_PATH"
          if [ -f "$APK_PATH" ]; then
            echo "APK ready: $APK_PATH"
          else
            echo "APK not found at $APK_PATH (non-blocking)"
          fi

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Write Play Store Service Account Key
        run: |
          echo "${{ secrets.PLAY_STORE_JSON_KEY }}" > play-store-key.json

      - name: Deploy to Play Store (internal)
        if: success()
        env:
          PLAY_STORE_JSON_KEY: play-store-key.json
        run: |
          bundle exec fastlane android deploy_internal

  release:
    needs: [build, deploy]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download APK Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release-apk
          path: apk/

      - name: Download AAB Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release-aab
          path: aab/

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Sign APK
        uses: ilharp/sign-android-release@v1
        with:
          releaseDir: apk/
          signingKey: ${{ secrets.SIGNING_KEY }}
          keyAlias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: signed-apk
          path: apk/*-signed.apk

      - name: Sign AAB
        uses: ilharp/sign-android-release@v1
        with:
          releaseDir: aab/
          signingKey: ${{ secrets.SIGNING_KEY }}
          keyAlias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: signed-aab
          path: aab/*-signed.aab

      - name: Generate Short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0-${{ steps.vars.outputs.sha_short }}"
          name: "NexusBlock Release (${{ steps.vars.outputs.sha_short }})"
          draft: false
          prerelease: false
          files: |
            apk/*-signed.apk
            aab/*-signed.aab
          body: |
            Automated build generated from commit ${{ github.sha }}.
            Contains signed APKs and AABs for all architectures (Universal, ARM, ARM64, x86, x86_64).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
