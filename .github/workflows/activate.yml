name: Gradle Command

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  gradle:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repo
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Run the Gradle task
        run: ./gradlew run
